# docker-compose.dev.yml — Entorno de desarrollo
# Uso: docker compose -f docker-compose.dev.yml up -d
#
# El frontend se corre fuera de Docker en dev (npm run dev) para hot-reload.
# El backend y la infra corren en contenedores (el backend monta el código local).

services:
  # ─── PostgreSQL 16 (base intermedia del sistema) ──────────────
  postgres:
    image: postgres:16-alpine
    container_name: sicop_postgres_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sicop}
      POSTGRES_USER: ${POSTGRES_USER:-sicop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sicop_dev_pw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sicop} -d ${POSTGRES_DB:-sicop}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis 7 (cache de queries pesadas SIGA) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: sicop_redis_dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── SQL Server 2022 (SIGA restaurado localmente) ─────────────
  # Nota: el backup SIGA_300687.bak se restaura mediante scripts/restore-siga.ps1
  # tras el primer arranque.
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sicop_sqlserver_siga_dev
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Sicop_Dev_2026!}
      MSSQL_PID: "Developer"
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./scripts/siga-backup:/backups
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Adminer (Gestor de BD por navegador web) ───────────────────
  # Accede en tu navegador a http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: sicop_adminer_dev
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ─── Backend (Hot-reload habilitado) ────────────────────────────
  # Corre uvicorn --reload montando el código fuente local.
  # Provee el entorno Linux con el driver ODBC de SQL Server listo.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sicop_backend_dev
    # Usamos bash -c para asegurarnos de activar el entorno y correr uvicorn desde /app
    command: bash -c "source venv/bin/activate && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_dev:/var/data/uploads
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - MSSQL_SERVER=sqlserver
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    name: sicop_postgres_data_dev
  redis_data:
    name: sicop_redis_data_dev
  sqlserver_data:
    name: sicop_sqlserver_data_dev
  uploads_dev:
    name: sicop_uploads_dev

