# docker-compose.dev.yml — Entorno de desarrollo
# Uso: docker compose -f docker-compose.dev.yml up -d
#
# El frontend se corre fuera de Docker en dev (npm run dev) para hot-reload.
# El backend y la infra corren en contenedores (el backend monta el código local).

services:
  # ─── PostgreSQL 16 (base intermedia del sistema) ──────────────
  postgres:
    image: postgres:16-alpine
    container_name: sicop_postgres_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sicop}
      POSTGRES_USER: ${POSTGRES_USER:-sicop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sicop_dev_pw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sicop} -d ${POSTGRES_DB:-sicop}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis 7 (cache de queries pesadas SIGA) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: sicop_redis_dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── SQL Server (SIGA) ────────────────────────────────────────
  # En dev el SQL Server corre en el HOST (instalación nativa Windows) con la
  # BD SIGA_300687 ya restaurada. El backend se conecta vía host.docker.internal.
  # (Servicio 'sqlserver' de Docker removido para no ocupar el puerto 1433.)

  # ─── Adminer (Gestor de BD por navegador web) ───────────────────
  # Accede en tu navegador a http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: sicop_adminer_dev
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ─── Backend (Hot-reload habilitado) ────────────────────────────
  # Corre uvicorn --reload montando el código fuente local.
  # Provee el entorno Linux con el driver ODBC de SQL Server listo.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sicop_backend_dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_dev:/var/data/uploads
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      # SIGA vive en el host (SQL Server nativo Windows). Desde el contenedor
      # Linux se llega vía host.docker.internal (Docker Desktop).
      - MSSQL_SERVER=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    name: sicop_postgres_data_dev
  redis_data:
    name: sicop_redis_data_dev
  uploads_dev:
    name: sicop_uploads_dev

