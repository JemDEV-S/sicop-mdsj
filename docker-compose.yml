# docker-compose.yml — Producción (stack completo)
# Uso: docker compose up -d
#
# Este compose incluye backend, frontend, nginx además de la infra.
# En dev, usar docker-compose.dev.yml para hot-reload.

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sicop_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sicop_internal
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sicop_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sicop_internal
    restart: unless-stopped

  # ─── Backend FastAPI ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sicop_backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/var/data/uploads
      - logs:/var/log/sicop
    networks:
      - sicop_internal
    restart: unless-stopped

  # ─── Nginx (reverse proxy + estáticos frontend) ───────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: sicop_nginx
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - uploads:/var/data/uploads:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - sicop_internal
    restart: unless-stopped

volumes:
  postgres_data:
    name: sicop_postgres_data
  redis_data:
    name: sicop_redis_data
  uploads:
    name: sicop_uploads
  logs:
    name: sicop_logs

networks:
  sicop_internal:
    name: sicop_internal
    driver: bridge
